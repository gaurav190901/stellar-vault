name: Deploy to Testnet

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust 1.85.0
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.85.0"
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-1.85-${{ hashFiles('**/Cargo.lock') }}

      - name: Install wasm-opt
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y binaryen

      - name: Install Stellar CLI
        run: cargo install --locked stellar-cli --features opt

      - name: Configure Stellar account
        env:
          STELLAR_SECRET_KEY: ${{ secrets.STELLAR_SECRET_KEY }}
        run: stellar keys add deployer --secret-key "$STELLAR_SECRET_KEY"

      - name: Build WASM
        run: cargo build --target wasm32-unknown-unknown --release --workspace

      - name: Optimize WASM
        run: |
          for f in target/wasm32-unknown-unknown/release/*.wasm; do
            wasm-opt "$f" --disable-reference-types -O2 -o "$f"
          done

      - name: Deploy contracts
        env:
          SOURCE: deployer
          NETWORK: testnet
        run: bash scripts/deploy.sh

      - name: Upload contract addresses
        uses: actions/upload-artifact@v4
        with:
          name: contract-addresses
          path: frontend/.env.local
