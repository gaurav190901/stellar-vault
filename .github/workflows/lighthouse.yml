name: Lighthouse CI

on:
  push:
    branches: [main]

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install
        working-directory: frontend

      - name: Build frontend
        run: pnpm build
        working-directory: frontend
        env:
          NEXT_PUBLIC_NETWORK: testnet
          NEXT_PUBLIC_HORIZON_URL: https://horizon-testnet.stellar.org
          NEXT_PUBLIC_SOROBAN_RPC: https://soroban-testnet.stellar.org
          NEXT_PUBLIC_VAULT_TOKEN_CONTRACT_ID: CAPQ327DH5GR5TGSWPIF44PIIDFQI3TNLA2DSSSY3GTZN32GQC6RNLDS
          NEXT_PUBLIC_REVENUE_ROUTER_CONTRACT_ID: CABPHTUFOX6NLNI5TYUSZF2CIXFMSEHGEU364NA4LNQXX5V7ZQDBPH2J
          NEXT_PUBLIC_SUBSCRIPTION_MANAGER_CONTRACT_ID: CCMYKDKG5LGUQFJVQFNCWSUVKTKCA33CZ32ZXOLLP6GFM6LUEHNI52F4
          NEXT_PUBLIC_ADMIN_ADDRESS: GC5HL2KXTCEXGZU4N6QIDQLIXW6HSFYEZV7ELAEEHDL4EHUMVSTZCPX6

      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli

      - name: Run Lighthouse CI
        run: lhci autorun
        working-directory: frontend
