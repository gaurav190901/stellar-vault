name: Contract Tests

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust 1.85.0
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.85.0"
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-1.85-${{ hashFiles('**/Cargo.lock') }}

      - name: Run contract tests
        run: cargo test --workspace

      - name: Install wasm-opt
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y binaryen

      - name: Build WASM
        run: cargo build --target wasm32-unknown-unknown --release --workspace

      - name: Optimize WASM
        run: |
          for f in target/wasm32-unknown-unknown/release/*.wasm; do
            wasm-opt "$f" --disable-reference-types -O2 -o "$f"
          done
